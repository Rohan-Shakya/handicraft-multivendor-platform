server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-site" always;
  # Enable HSTS when served behind TLS termination
  # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Content Security Policy — defense in depth against XSS.
  # `style-src 'unsafe-inline'` is required by shadcn/ui + Tailwind runtime
  # styles. `script-src` is strict (no inline/eval).
  #
  # DEPLOYMENT: replace the `connect-src` value with your specific API origin
  # before going to production. The default `https:` permits any HTTPS origin
  # so the admin works locally; tightening prevents data exfiltration if an
  # XSS bug ever slips past the script-src restriction.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'; upgrade-insecure-requests" always;

  # Serve static assets with long cache
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — all routes go to index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}

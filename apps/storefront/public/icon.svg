<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a4d3a"/>
      <stop offset="100%" stop-color="#2d3d2d"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Rug body -->
  <rect x="14" y="20" width="36" height="24" rx="1.5" fill="#f0e9da"/>
  <!-- Outer border -->
  <rect x="16" y="22" width="32" height="20" rx="0.5" fill="none" stroke="#a65a3c" stroke-width="1" opacity="0.55"/>
  <!-- Inner medallion -->
  <ellipse cx="32" cy="32" rx="9" ry="6" fill="none" stroke="#a65a3c" stroke-width="1.2"/>
  <ellipse cx="32" cy="32" rx="5" ry="3" fill="#a65a3c" opacity="0.5"/>
  <circle cx="32" cy="32" r="1.6" fill="#3a4d3a"/>
  <!-- Top fringe -->
  <g stroke="#f0e9da" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <line x1="16" y1="20" x2="16" y2="17.5"/>
    <line x1="20" y1="20" x2="20" y2="17.5"/>
    <line x1="24" y1="20" x2="24" y2="17.5"/>
    <line x1="28" y1="20" x2="28" y2="17.5"/>
    <line x1="32" y1="20" x2="32" y2="17.5"/>
    <line x1="36" y1="20" x2="36" y2="17.5"/>
    <line x1="40" y1="20" x2="40" y2="17.5"/>
    <line x1="44" y1="20" x2="44" y2="17.5"/>
    <line x1="48" y1="20" x2="48" y2="17.5"/>
  </g>
  <!-- Bottom fringe -->
  <g stroke="#f0e9da" stroke-width="1" stroke-linecap="round" opacity="0.85">
    <line x1="16" y1="44" x2="16" y2="46.5"/>
    <line x1="20" y1="44" x2="20" y2="46.5"/>
    <line x1="24" y1="44" x2="24" y2="46.5"/>
    <line x1="28" y1="44" x2="28" y2="46.5"/>
    <line x1="32" y1="44" x2="32" y2="46.5"/>
    <line x1="36" y1="44" x2="36" y2="46.5"/>
    <line x1="40" y1="44" x2="40" y2="46.5"/>
    <line x1="44" y1="44" x2="44" y2="46.5"/>
    <line x1="48" y1="44" x2="48" y2="46.5"/>
  </g>
</svg>
